# =============================================================================
# Logstash Pipeline Configuration — SecOps Edition
# =============================================================================
# Receives security-enriched logs from Filebeat, parses with grok, enriches
# with GeoIP data, tags security alerts, and outputs to both app-logs and
# security-logs indices in Elasticsearch.
# =============================================================================

# ---------------------------------------------------------------------------
# INPUT: Accept logs from Filebeat over the Beats protocol on port 5044
# ---------------------------------------------------------------------------
input {
  beats {
    port => 5044
  }
}

# ---------------------------------------------------------------------------
# FILTER: Parse raw log lines into structured fields
# ---------------------------------------------------------------------------
filter {

  # --------------------------------------------------------------------------
  # GROK: Parse the enriched log format with security fields
  # Format: [TIMESTAMP] [LEVEL] [service] [source_ip=x.x.x.x] [user=name] [action=ACT] - message
  # Example: [2026-04-12T09:31:33] [ERROR] [auth-service] [source_ip=91.108.4.1] [user=admin] [action=AUTH_FAIL] - Failed login attempt
  # --------------------------------------------------------------------------
  grok {
    match => {
      "message" => "\[%{TIMESTAMP_ISO8601:log_timestamp}\] \[%{LOGLEVEL:log_level}\] \[%{DATA:service_name}\] \[source_ip=%{IP:source_ip}\] \[user=%{DATA:user}\] \[action=%{DATA:action}\] - %{GREEDYDATA:log_message}"
    }
    # If grok fails, tag the event so we can debug later
    tag_on_failure => ["_grokparsefailure"]
  }

  # --------------------------------------------------------------------------
  # DATE: Parse the extracted timestamp string into the @timestamp field
  # This ensures Elasticsearch uses the log's own timestamp, not ingestion time
  # --------------------------------------------------------------------------
  date {
    match => ["log_timestamp", "ISO8601"]
    target => "@timestamp"
    # Remove the intermediate field after parsing
    remove_field => ["log_timestamp"]
  }

  # --------------------------------------------------------------------------
  # MESSAGE: Replace the original 'message' field with the parsed log message
  # (the original 'message' contained the full raw line including brackets)
  # --------------------------------------------------------------------------
  if [log_message] {
    mutate {
      replace => { "message" => "%{log_message}" }
      remove_field => ["log_message"]
    }
  }

  # --------------------------------------------------------------------------
  # GEOIP: Enrich source_ip with geographic data (country, city, lat/lon)
  # Powers the Kibana threat map visualization. Uses the GeoLite2 database
  # bundled with Logstash. Private IPs will be silently skipped.
  # --------------------------------------------------------------------------
  if [source_ip] {
    geoip {
      source => "source_ip"
      target => "geoip"
      # Add geographic fields: country_name, city_name, location (lat/lon), etc.
    }
  }

  # --------------------------------------------------------------------------
  # SECURITY TAGGING: Tag events that indicate potential security incidents
  # Any ERROR-level log with a FAIL action is tagged as a security alert
  # --------------------------------------------------------------------------
  if [log_level] == "ERROR" and [action] =~ /FAIL/ {
    mutate {
      add_tag => ["security_alert"]
    }
  }

  # --------------------------------------------------------------------------
  # METADATA: Tag the environment as "dev" (not indexed, only for routing)
  # --------------------------------------------------------------------------
  mutate {
    add_field => { "[@metadata][env]" => "dev" }
  }
}

# ---------------------------------------------------------------------------
# OUTPUT: Send parsed logs to both app-logs and security-logs indices
# The dual output preserves backward compatibility with the original pipeline
# while providing a dedicated security index for SIEM and ML queries.
# ---------------------------------------------------------------------------
output {

  # Original app-logs index — preserves the existing dashboard and pipeline
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "changeme"
    index => "app-logs-%{+YYYY.MM.dd}"
  }

  # Security-logs index — dedicated for SIEM rules, ML anomaly detection,
  # and the SecOps threat dashboard
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "changeme"
    index => "security-logs-%{+YYYY.MM.dd}"
  }

  # Optional: also print to stdout for debugging (comment out in production)
  # stdout { codec => rubydebug }
}
